name: 'Setup to run Terragrunt'
description: 'A composite action to setup all the required resources to run Terragrunt in AWS'

inputs:
  deploy-keys:
    description: 'SSH private keys secret names (i.e DEPLOY_KEY) for deploy key access (can be multiple keys separated by newlines)'
    required: true
  role-to-assume:
    description: 'ARN of the IAM role to assume for AWS authentication'
    required: true
  aws-region:
    description: 'AWS region to use'
    required: true
  ts-oauth-client-id:
    description: 'Tailscale WIF OAuth client ID — sets TAILSCALE_OAUTH_CLIENT_ID for the Tailscale Terraform provider'
    required: false
  ts-audience:
    description: 'Tailscale WIF audience (api.tailscale.com/<client_id>) — used to request the OIDC token'
    required: false
  ts-tags:
    description: 'Tailscale tags to assign to the runner device when joining the tailnet'
    required: false

runs:
  using: 'composite'
  steps:
    # Use deploy key for Terragrunt to pull private repositories
    - uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ inputs.deploy-keys }}

    # Use OIDC to authenticate GitHub Actions with AWS
    # Terragrunt needs permissions from AWS to run plan and apply
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@main
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    # Mise installs all required tools (Terragrunt, OpenTofu, Go, Python, ...)
    # See `mise.toml`.
    - name: Install mise
      uses: jdx/mise-action@v4
      with:
        version: 2026.4.0

    # Fetches a GitHub OIDC JWT scoped to the Tailscale audience and exports
    # TAILSCALE_IDENTITY_TOKEN + TAILSCALE_OAUTH_CLIENT_ID as workflow env vars,
    # so the Tailscale Terraform provider can authenticate without a long-lived secret.
    - name: Get Tailscale identity token
      if: inputs.ts-oauth-client-id != ''
      uses: actions/github-script@v7
      with:
        script: |
          const token = await core.getIDToken('${{ inputs.ts-audience }}')
          core.setSecret(token)
          core.exportVariable('TAILSCALE_IDENTITY_TOKEN', token)
          core.exportVariable('TAILSCALE_OAUTH_CLIENT_ID', '${{ inputs.ts-oauth-client-id }}')

    - name: Connect to Tailscale
      if: inputs.ts-oauth-client-id != ''
      uses: tailscale/github-action@v4
      with:
        oauth-client-id: ${{ inputs.ts-oauth-client-id }}
        audience: ${{ inputs.ts-audience }}
        tags: ${{ inputs.ts-tags }}
