name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  workflow_dispatch:

# Prevent CI to run concurrently
# As this workflow runs Terragrunt, it would create lock states
concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  # Disable canceling workflows as this would also create locks
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read
  id-token: 'write'

env:
  # Timeout for testing infrastructure
  TERRATEST_TIMEOUT: 60m

jobs:
  check-if-pr-is-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Fail if PR is in draft mode
        if: github.event.pull_request.draft == true
        run: |
          echo "PR is in draft mode. CI does not run on draft PRs."
          exit 1

  code-quality-checks:
    runs-on: ubuntu-latest
    needs: check-if-pr-is-draft
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs all required tools (`mise.toml`)
      # Authenticates with AWS
      # Sets up deploy keys to pull external repositories when running Terragrunt
      - uses: ./.github/actions/setup
        with:
          deploy-keys: |
            ${{ secrets.DEPLOY_KEY_TG_LIVE }}
            ${{ secrets.DEPLOY_KEY_TG_CATALOG }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install pre-commit
        run: pip install pre-commit

      # Runs the checks as in pre-commits (terragrunt-hcl-fmt)
      # This prevents any discrepancies between the pre-commit checks and the CI checks
      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  terragrunt-validate-plan:
    runs-on: ubuntu-latest
    needs: code-quality-checks
    strategy:
      matrix:
        env:
          - staging
          - prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs all required tools (`mise.toml`)
      # Authenticates with AWS
      # Sets up deploy keys to pull external repositories when running Terragrunt
      - uses: ./.github/actions/setup
        with:
          deploy-keys: |
            ${{ secrets.DEPLOY_KEY_TG_LIVE }}
            ${{ secrets.DEPLOY_KEY_TG_CATALOG }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install aha to convert plan output to html
        run: sudo apt-get install aha

      - name: Terragrunt stack generate, validate, and plan on ${{ matrix.env }}
        run: |
          cd live/${{ matrix.env }}
          terragrunt stack generate
          terragrunt run --all init --no-stack-generate --backend-bootstrap --non-interactive
          terragrunt run --all validate --no-stack-generate
          terragrunt run --all plan --no-stack-generate > ${{ matrix.env }}-plan-output.txt
          cat ${{ matrix.env }}-plan-output.txt | aha --black > prod-plan-output.html

      - name: Upload plan output (prod)
        if: matrix.env == 'prod'
        id: upload-plan
        uses: actions/upload-artifact@v4
        with:
          name: terragrunt-prod-plan
          path: live/prod/prod-plan-output.html

      - name: Save artifact URL to file
        if: matrix.env == 'prod'
        run: echo "${{ steps.upload-plan.outputs.artifact-url }}" > artifact_url.txt

      - name: Upload artifact URL file
        if: matrix.env == 'prod'
        uses: actions/upload-artifact@v4
        with:
          name: artifact-url
          path: artifact_url.txt

  check-pr-labels:
    # Gates the terratest run: ensures exactly one of 'run-terratest' or 'skip-terratest' is present on the PR
    needs: terragrunt-validate-plan
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.set-output.outputs.should_run }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR labels
        id: check-pr-labels
        run: |
          labels=$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name')
          echo "Labels on PR: $labels"
          if echo "$labels" | grep -qw "run-terratest"; then
            echo "run_present=true" >> $GITHUB_OUTPUT
          else
            echo "run_present=false" >> $GITHUB_OUTPUT
          fi
          if echo "$labels" | grep -qw "skip-terratest"; then
            echo "skip_present=true" >> $GITHUB_OUTPUT
          else
            echo "skip_present=false" >> $GITHUB_OUTPUT
          fi
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}

      - name: Comment on PR if 'skip-terratest' label is present
        if: steps.check-pr-labels.outputs.skip_present == 'true'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            The `skip-terratest` label have been added to this PR.
            infrastructure tests will not run.

      - name: Comment PR if missing label
        if: steps.check-pr-labels.outputs.run_present == 'false' && steps.check-pr-labels.outputs.skip_present == 'false'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            :x: Please add the `run-terratest` label to this PR in order to run infrastructure tests.
            Otherwise add the `skip-terratest` if you do not want to run tests.

      - name: Fail if label missing
        if: steps.check-pr-labels.outputs.run_present == 'false' && steps.check-pr-labels.outputs.skip_present == 'false'
        run: exit 1

      - name: Set should_run output
        id: set-output
        if: always()
        run: |
          if [[ "${{ steps.check-pr-labels.outputs.run_present }}" == "true" && "${{ steps.check-pr-labels.outputs.skip_present }}" == "false" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  terratest:
    # Runs Terratest to deploy the infrastructure in the staging environment
    # Performs some tests and then destroys the infra.
    needs: check-pr-labels
    if: needs.check-pr-labels.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      client_id: ${{ steps.ts-oauth-create.outputs.client_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs all required tools (`mise.toml`)
      # Authenticates with AWS
      # Sets up deploy keys to pull external repositories when running Terragrunt
      # Connects to Tailscale so the runner can reach private cluster resources
      - uses: ./.github/actions/setup
        with:
          deploy-keys: |
            ${{ secrets.DEPLOY_KEY_TG_LIVE }}
            ${{ secrets.DEPLOY_KEY_TG_CATALOG }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          ts-oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          ts-audience: ${{ secrets.TS_AUDIENCE }}
          ts-tags: ${{ secrets.TS_TAGS }}

      - name: Request Tailscale API token using WIF credentials
        id: ts-token-exchange
        uses: ./.github/actions/tailscale-token-exchange
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}

      - name: Create temporary Tailscale OAuth client
        id: ts-oauth-create
        env:
          TS_TOKEN: ${{ steps.ts-token-exchange.outputs.ts_token }}
          TS_TAGS: ${{ secrets.TS_TAGS }}
        run: |
          response=$(curl -sS 'https://api.tailscale.com/api/v2/tailnet/-/keys' \
            --request POST \
            --header 'Content-Type: application/json' \
            --header "Authorization: Bearer $TS_TOKEN" \
            --data "{
              \"keyType\": \"client\",
              \"description\": \"terratest-ci-${{ github.run_id }}\",
              \"tags\": [
                \"$TS_TAGS\"
              ],
              \"scopes\": [\"all\"]
            }")

          client_id=$(echo "$response" | jq -r '.id')
          client_secret=$(echo "$response" | jq -r '.key')

          if [ -z "$client_id" ] || [ "$client_id" = "null" ]; then
            echo "ERROR: OAuth client creation failed"
            exit 1
          fi

          echo "::add-mask::$client_secret"
          echo "client_id=$client_id" >> $GITHUB_OUTPUT
          echo "client_secret=$client_secret" >> $GITHUB_OUTPUT

      # Use newly created OAuth client instead of WIF credentials
      # WIF token expires after 10 min and terratest takes 30m+
      # OAuth is a long lived credential but we delete it just after terratest
      - name: Run Terratest
        env:
          TAILSCALE_IDENTITY_TOKEN: ""
          TAILSCALE_OAUTH_CLIENT_ID: ${{ steps.ts-oauth-create.outputs.client_id }}
          TAILSCALE_OAUTH_CLIENT_SECRET: ${{ steps.ts-oauth-create.outputs.client_secret }}
        run: go test -v ./tests/... -timeout ${{ env.TERRATEST_TIMEOUT }}

  revoke-oauth:
    # Revokes the temporary Tailscale OAuth client created during terratest.
    # Runs even when terratest fails to ensure no credentials are left behind.
    needs: [check-pr-labels, terratest]
    if: always() && needs.check-pr-labels.outputs.should_run == 'true' && needs.terratest.outputs.client_id != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Request Tailscale API token using WIF credentials
        id: ts-token-exchange
        uses: ./.github/actions/tailscale-token-exchange
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}

      - name: Revoke temporary Tailscale OAuth client
        env:
          TS_TOKEN: ${{ steps.ts-token-exchange.outputs.ts_token }}
          CLIENT_ID: ${{ needs.terratest.outputs.client_id }}
        run: |
          response=$(curl -sS "https://api.tailscale.com/api/v2/tailnet/-/keys/$CLIENT_ID" \
            --request DELETE \
            --header "Authorization: Bearer $TS_TOKEN")

          if [ "$response" != "null" ]; then
            echo "ERROR: OAuth client revokation failed"
            exit 1
          fi

  comment-tg-plan-on-pr:
    runs-on: ubuntu-latest
    needs: [terragrunt-validate-plan, revoke-oauth]
    if: always() && needs.terragrunt-validate-plan.result == 'success'

    steps:
      - name: Download artifact-url file
        uses: actions/download-artifact@v4
        with:
          name: artifact-url

      - name: Set short commit SHA
        id: set-short-commit-sha
        run: echo "short_sha=${HEAD_SHA::7}" >> $GITHUB_OUTPUT
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Read artifact URL
        id: artifact-url
        run: |
          url=$(cat artifact_url.txt)
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            :warning: **Production Plan Available**

            Download and review the [terragrunt plan output](${{ steps.artifact-url.outputs.url }}) that ran on the production environment.

            **Commit:** `${{ steps.set-short-commit-sha.outputs.short_sha }}`

            Please review the plan carefully.
            :exclamation: **Upon merging this PR, the plan will be applied to production!**

            Add the `skip-cd` label to prevent the automatic deployment.
