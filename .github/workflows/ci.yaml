name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read
  id-token: 'write'

jobs:
  code-quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs all required tools (`mise.toml`)
      # Authenticates with AWS
      # Sets up deploy keys to pull external repositories when running Terragrunt
      - uses: ./.github/actions/setup
        with:
          deploy-keys: |
            ${{ secrets.DEPLOY_KEY_TG_LIVE }}
            ${{ secrets.DEPLOY_KEY_TG_CATALOG }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install pre-commit
        run: pip install pre-commit

      # Runs the checks as in pre-commits (tflint, ...)
      # This prevents any discrepancies between the pre-commit checks and the CI checks 
      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  terragrunt-validate-plan:
    runs-on: ubuntu-latest
    needs: code-quality-checks
    strategy:
      matrix:
        env:
          - dev
          - staging
          - prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs all required tools (`mise.toml`)
      # Authenticates with AWS
      # Sets up deploy keys to pull external repositories when running Terragrunt
      - uses: ./.github/actions/setup
        with:
          deploy-keys: |
            ${{ secrets.DEPLOY_KEY_TG_LIVE }}
            ${{ secrets.DEPLOY_KEY_TG_CATALOG }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install aha to convert plan output to html
        run: sudo apt-get install aha

      - name: Terragrunt stack generate, validate, and plan on ${{ matrix.env }}
        run: |
          cd live/${{ matrix.env }}
          terragrunt stack generate
          terragrunt run --all init --no-stack-generate --backend-bootstrap --non-interactive
          terragrunt run --all validate --no-stack-generate
          terragrunt run --all plan --no-stack-generate > ${{ matrix.env }}-plan-output.txt
          cat ${{ matrix.env }}-plan-output.txt | aha --black > prod-plan-output.html

      - name: Upload plan output (prod)
        if: matrix.env == 'prod'
        id: upload-plan
        uses: actions/upload-artifact@v4
        with:
          name: terragrunt-prod-plan
          path: live/prod/prod-plan-output.html

      - name: Save artifact URL to file
        if: matrix.env == 'prod'
        run: echo "${{ steps.upload-plan.outputs.artifact-url }}" > artifact_url.txt
      
      - name: Upload artifact URL file
        if: matrix.env == 'prod'
        uses: actions/upload-artifact@v4
        with:
          name: artifact-url
          path: artifact_url.txt

  terratest:
    runs-on: ubuntu-latest
    needs: terragrunt-validate-plan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if PR has 'run-terratest' label
        id: check-label-run
        run: |
          labels=$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name')
          echo "Labels on PR: $labels"
          if echo "$labels" | grep -qw "run-terratest"; then
            echo "label_present=true" >> $GITHUB_OUTPUT
          else
            echo "label_present=false" >> $GITHUB_OUTPUT
          fi
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}

      - name: Check if PR has 'skip-terratest' label
        id: check-label-skip
        run: |
          labels=$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name')
          echo "Labels on PR: $labels"
          if echo "$labels" | grep -qw "skip-terratest"; then
            echo "label_present=true" >> $GITHUB_OUTPUT
          else
            echo "label_present=false" >> $GITHUB_OUTPUT
          fi
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}

      - name: Comment on PR if 'skip-terratest' label is present
        if: steps.check-label-skip.outputs.label_present == 'true'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            The `skip-terratest` label have been added to this PR.
            infrastructure tests will not run.

      - name: Comment PR if missing label
        if: steps.check-label-run.outputs.label_present == 'false' && steps.check-label-skip.outputs.label_present == 'false' 
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            :x: Please add the `run-terratest` label to this PR in order to run infrastructure tests.
            Otherwise add the `skip-terratest` if you do not want to run tests.

      - name: Fail if label missing
        if: steps.check-label-run.outputs.label_present == 'false' && steps.check-label-skip.outputs.label_present == 'false' 
        run: exit 1

      # Installs all required tools (`mise.toml`)
      # Authenticates with AWS
      # Sets up deploy keys to pull external repositories when running Terragrunt
      - uses: ./.github/actions/setup
        with:
          deploy-keys: |
            ${{ secrets.DEPLOY_KEY_TG_LIVE }}
            ${{ secrets.DEPLOY_KEY_TG_CATALOG }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run Terratest
        if: steps.check-label-skip.outputs.label_present == 'false'
        run: go test -v ./tests/... -timeout 30m

  comment-tg-plan-on-pr:
    runs-on: ubuntu-latest
    needs: terratest

    steps:
      - name: Download artifact-url file
        uses: actions/download-artifact@v4
        with:
          name: artifact-url

      - name: Set short commit SHA
        id: set-short-commit-sha
        run: echo "short_sha=${HEAD_SHA::7}" >> $GITHUB_OUTPUT
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Read artifact URL
        id: artifact-url
        run: |
          url=$(cat artifact_url.txt)
          echo "url=$url" >> $GITHUB_OUTPUT
      
      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            :warning: **Production Plan Available**

            Download and review the [terragrunt plan output](${{ steps.artifact-url.outputs.url }}) that ran on the production environment.

            **Commit:** `${{ steps.set-short-commit-sha.outputs.short_sha }}`

            Please review the plan carefully.  
            :exclamation: **Upon merging this PR, the plan will be applied to production!**

            Add the `skip-cd` label to prevent the automatic deployment.
