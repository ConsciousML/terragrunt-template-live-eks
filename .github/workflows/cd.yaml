name: Apply on Production Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-${{ github.head_ref || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: 'write'
  pull-requests: read

jobs:
  check-skip-cd:
    runs-on: ubuntu-24.04
    outputs:
      should_skip: ${{ steps.check-label.outputs.skip_cd }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get commit SHA
        id: get-sha
        run: |
          SHA_COMMIT=$(git rev-parse HEAD)
          echo "SHA_COMMIT=$SHA_COMMIT" >> $GITHUB_OUTPUT
          echo "Commit SHA: $SHA_COMMIT"

      - name: Find PR number for commit
        id: find-pr
        run: |
          PR_NUMBER=$(gh pr list --search ${{ steps.get-sha.outputs.SHA_COMMIT }} --state all --json number --jq '.[0].number')
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "PR number: $PR_NUMBER"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check for skip-cd label
        id: check-label
        run: |
          PR_NUMBER="${{ steps.find-pr.outputs.PR_NUMBER }}"

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "⚠️  No PR found for this commit - skipping CD as safety measure"
            SKIP_CD=true
          else
            echo "Checking labels on PR #$PR_NUMBER"
            SKIP_CD=$(gh pr view $PR_NUMBER --json labels --jq 'any(.labels[].name; . == "skip-cd")')

            if [ "$SKIP_CD" = "true" ]; then
              echo "⏭️  Found 'skip-cd' label - deployment will be skipped"
            else
              echo "✅ No 'skip-cd' label - deployment will proceed"
            fi
          fi

          echo "skip_cd=$SKIP_CD" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

  terragrunt-apply-prod:
    runs-on: ubuntu-24.04
    needs: check-skip-cd
    if: needs.check-skip-cd.outputs.should_skip != 'true'
    outputs:
      client_id: ${{ steps.ts-oauth-create.outputs.client_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs all required tools (`mise.toml`)
      # Authenticates with AWS
      # Sets up deploy keys to pull external repositories when running Terragrunt
      # Connects to Tailscale — required by the Tailscale provider during apply
      - uses: ./.github/actions/setup
        with:
          deploy-keys: |
            ${{ secrets.DEPLOY_KEY_TG_LIVE }}
            ${{ secrets.DEPLOY_KEY_TG_CATALOG }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          ts-oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          ts-audience: ${{ secrets.TS_AUDIENCE }}
          ts-tags: ${{ secrets.TS_TAGS }}

      - name: Request Tailscale API token using WIF credentials
        id: ts-token-exchange
        uses: ./.github/actions/tailscale-token-exchange
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}

      - name: Create temporary Tailscale OAuth client
        id: ts-oauth-create
        uses: ./.github/actions/tailscale-oauth-create
        with:
          ts-token: ${{ steps.ts-token-exchange.outputs.ts_token }}
          ts-tags: ${{ secrets.TS_TAGS }}
          description: cd-apply-prod-${{ github.run_id }}

      # Use newly created OAuth client instead of WIF credentials
      # WIF token expires after 10 min and apply can take longer
      # OAuth is a long lived credential but we delete it just after apply
      - name: Terragrunt apply on prod
        env:
          TAILSCALE_IDENTITY_TOKEN: ""
          TAILSCALE_OAUTH_CLIENT_ID: ${{ steps.ts-oauth-create.outputs.client_id }}
          TAILSCALE_OAUTH_CLIENT_SECRET: ${{ steps.ts-oauth-create.outputs.client_secret }}
          EKS_LOCAL_ADMIN_ARN: ${{ secrets.EKS_LOCAL_ADMIN_ARN }}
        run: |
          cd live/prod
          terragrunt stack run init
          terragrunt run --all apply --backend-bootstrap --non-interactive

  revoke-oauth:
    # Revokes the temporary Tailscale OAuth client created during apply.
    # Runs even when apply fails to ensure no credentials are left behind.
    needs: [check-skip-cd, terragrunt-apply-prod]
    if: always() && needs.check-skip-cd.outputs.should_skip != 'true' && needs.terragrunt-apply-prod.outputs.client_id != ''
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Request Tailscale API token using WIF credentials
        id: ts-token-exchange
        uses: ./.github/actions/tailscale-token-exchange
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}

      - name: Revoke temporary Tailscale OAuth client
        uses: ./.github/actions/tailscale-oauth-revoke
        with:
          ts-token: ${{ steps.ts-token-exchange.outputs.ts_token }}
          client-id: ${{ needs.terragrunt-apply-prod.outputs.client_id }}